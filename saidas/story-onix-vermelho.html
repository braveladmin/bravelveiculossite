<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Story — Onix LT Turbo Vermelho · Bravel Veículos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Story canvas: 1080 × 1920 ── */
    .story {
      width: 1080px;
      height: 1920px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      transform-origin: top center;
      transform: scale(var(--s, 0.45));
      margin-bottom: calc((1920px * var(--s, 0.45)) - 1920px);
    }

    /* ──────────────────────────────────────
       FOTO HERO
    ────────────────────────────────────── */
    .car-wrap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1080px;
      z-index: 1;
    }

    .car-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 50%;
    }

    .fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 280px;
      background: linear-gradient(to bottom, #0a0a0a 0%, rgba(10,10,10,0.55) 50%, transparent 100%);
    }

    .fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 520px;
      background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.9) 50%, transparent 100%);
    }

    /* Reflexo vermelho sutil */
    .red-glow {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100%;
      background: radial-gradient(ellipse 70% 40% at 30% 95%, rgba(180,20,20,0.12) 0%, transparent 65%);
      z-index: 2;
      pointer-events: none;
    }

    /* ──────────────────────────────────────
       HEADER
    ────────────────────────────────────── */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 64px 72px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .logo img {
      width: 130px;
      filter: drop-shadow(0 2px 16px rgba(0,0,0,0.95));
    }

    .badge {
      background: #cc1111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      margin-top: 8px;
    }

    /* ──────────────────────────────────────
       INFO
    ────────────────────────────────────── */
    .info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 5;
      padding: 0 72px 80px;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #cc1111;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .car-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 192px;
      color: #ffffff;
      line-height: 0.88;
      letter-spacing: 3px;
      margin-bottom: 18px;
    }

    .car-version {
      font-family: 'Montserrat', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: #909090;
      margin-bottom: 48px;
    }

    .divider {
      width: 64px;
      height: 3px;
      background: #cc1111;
      border-radius: 2px;
      margin-bottom: 48px;
    }

    /* Specs */
    .specs {
      display: flex;
      gap: 0;
      margin-bottom: 44px;
    }

    .spec {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 52px;
      margin-right: 52px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .spec:last-child { border-right: none; margin-right: 0; padding-right: 0; }

    .spec-label {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }

    .spec-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 27px;
      font-weight: 700;
      color: #e8e8e8;
    }

    /* Opcionais */
    .optionals {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 52px;
    }

    .opt-tag {
      font-family: 'Inter', sans-serif;
      font-size: 19px;
      font-weight: 500;
      color: #c4c4c4;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 22px;
      border-radius: 100px;
      letter-spacing: 0.3px;
    }

    /* Preço */
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 52px;
    }

    .price-currency {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #666;
    }

    .price-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 88px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
    }

    /* CTA */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      background: #cc1111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 30px 54px;
      border-radius: 6px;
      width: fit-content;
      text-transform: uppercase;
    }

    .cta svg { width: 30px; height: 30px; fill: #fff; flex-shrink: 0; }

    .location {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 19px;
      color: #3d3d3d;
    }

    .location::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: #cc1111;
      border-radius: 50%;
    }
  </style>
</head>
<body>

<div class="story">

  <!-- Foto hero -->
  <div class="car-wrap">
    <img class="car-photo"
      src="../site/veiculos/onix vermelho/bravelveiculos_1781177412_3917122148434905461_44311545539.jpg"
      alt="Chevrolet Onix LT Turbo Vermelho">
    <div class="fade-top"></div>
    <div class="fade-bottom"></div>
    <div class="red-glow"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="logo"><img src="../site/bravel-logo.png" alt="Bravel Veículos"></div>
    <div class="badge">Novo no estoque</div>
  </div>

  <!-- Info -->
  <div class="info">

    <div class="eyebrow">Chevrolet · Hatch · 2021/2022</div>
    <div class="car-name">ONIX</div>
    <div class="car-version">LT 1.0 Turbo · Vermelho</div>

    <div class="divider"></div>

    <div class="specs">
      <div class="spec">
        <span class="spec-label">Quilômetros</span>
        <span class="spec-value">50.000 km</span>
      </div>
      <div class="spec">
        <span class="spec-label">Câmbio</span>
        <span class="spec-value">Manual</span>
      </div>
      <div class="spec">
        <span class="spec-label">Combustível</span>
        <span class="spec-value">Flex</span>
      </div>
    </div>

    <div class="optionals">
      <span class="opt-tag">Kit Multimídia</span>
      <span class="opt-tag">Rodas de liga leve</span>
      <span class="opt-tag">Pneus novos</span>
      <span class="opt-tag">Volante multifuncional</span>
    </div>

    <div class="price-row">
      <span class="price-currency">R$</span>
      <span class="price-value">71.900</span>
    </div>

    <div class="cta">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Tenho interesse
    </div>

    <div class="location">Primavera do Leste · Mato Grosso</div>

  </div>

</div>

<script>
  function fit() {
    const s = Math.min((window.innerWidth - 40) / 1080, (window.innerHeight - 80) / 1920);
    document.querySelector('.story').style.setProperty('--s', s);
  }
  fit();
  window.addEventListener('resize', fit);
</script>

</body>
</html>
