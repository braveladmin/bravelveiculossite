<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Story — Creta Ultimate · Bravel Veículos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Story canvas: 1080 × 1920 ── */
    .story {
      width: 1080px;
      height: 1920px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;

      /* Scale to fit viewport without clipping */
      transform-origin: top center;
      transform: scale(var(--preview-scale, 0.45));
      margin-bottom: calc((1920px * var(--preview-scale, 0.45)) - 1920px);
    }

    /* ── Faint red ambient glow ── */
    .story::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: radial-gradient(ellipse 90% 60% at 50% 100%, rgba(204,17,17,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    /* ──────────────────────────────────────
       FOTO DO CARRO
    ────────────────────────────────────── */
    .car-wrap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1100px;
      z-index: 1;
    }

    .car-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 55%;
    }

    /* Fade para o topo (onde fica o header) */
    .car-fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 320px;
      background: linear-gradient(to bottom, #0a0a0a 0%, rgba(10,10,10,0.6) 40%, transparent 100%);
    }

    /* Fade para o fundo (onde fica a info) */
    .car-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 500px;
      background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.85) 45%, transparent 100%);
    }

    /* ──────────────────────────────────────
       HEADER
    ────────────────────────────────────── */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 64px 72px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .header-logo img {
      width: 130px;
      filter: drop-shadow(0 2px 16px rgba(0,0,0,0.9));
    }

    .badge-new {
      background: #cc1111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 4px;
      margin-top: 8px;
    }

    /* ──────────────────────────────────────
       INFO SECTION (bottom)
    ────────────────────────────────────── */
    .info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 5;
      padding: 0 72px 84px;
      display: flex;
      flex-direction: column;
    }

    /* Marca + tipo */
    .car-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #cc1111;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Nome principal */
    .car-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 192px;
      color: #ffffff;
      line-height: 0.88;
      letter-spacing: 3px;
      margin-bottom: 18px;
    }

    /* Versão */
    .car-version {
      font-family: 'Montserrat', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: #a0a0a0;
      letter-spacing: 0.5px;
      margin-bottom: 52px;
    }

    /* Linha vermelha */
    .divider {
      width: 64px;
      height: 3px;
      background: #cc1111;
      margin-bottom: 52px;
      border-radius: 2px;
    }

    /* Specs */
    .specs {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 56px;
    }

    .spec {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 52px;
      margin-right: 52px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .spec:last-child {
      border-right: none;
      padding-right: 0;
      margin-right: 0;
    }

    .spec-label {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 400;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }

    .spec-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 27px;
      font-weight: 700;
      color: #e8e8e8;
    }

    /* Preço */
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 56px;
    }

    .price-currency {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #777;
    }

    .price-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 88px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
    }

    /* CTA */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      background: #cc1111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 30px 54px;
      border-radius: 6px;
      width: fit-content;
      text-transform: uppercase;
    }

    .cta-btn svg {
      width: 30px;
      height: 30px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* Localização */
    .location {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 19px;
      font-weight: 400;
      color: #444;
      letter-spacing: 0.5px;
    }

    .location::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #cc1111;
      border-radius: 50%;
      flex-shrink: 0;
    }

  </style>
</head>
<body>

<div class="story">

  <!-- Foto do carro -->
  <div class="car-wrap">
    <img class="car-photo" src="../site/veiculos/Creta/01.jpg" alt="Hyundai Creta Ultimate">
    <div class="car-fade-top"></div>
    <div class="car-fade-bottom"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="../site/bravel-logo.png" alt="Bravel Veículos">
    </div>
    <div class="badge-new">Novo no estoque</div>
  </div>

  <!-- Info -->
  <div class="info">

    <div class="car-eyebrow">Hyundai · SUV · 2025/2026</div>
    <div class="car-name">CRETA</div>
    <div class="car-version">Ultimate 1.6 TGDI</div>

    <div class="divider"></div>

    <div class="specs">
      <div class="spec">
        <span class="spec-label">Quilômetros</span>
        <span class="spec-value">12.000 km</span>
      </div>
      <div class="spec">
        <span class="spec-label">Câmbio</span>
        <span class="spec-value">Automático</span>
      </div>
      <div class="spec">
        <span class="spec-label">Combustível</span>
        <span class="spec-value">Gasolina</span>
      </div>
    </div>

    <div class="price-row">
      <span class="price-currency">R$</span>
      <span class="price-value">168.900</span>
    </div>

    <div class="cta-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Tenho interesse
    </div>

    <div class="location">Primavera do Leste · Mato Grosso</div>

  </div>

</div>

<script>
  /* Ajusta o scale para caber no viewport */
  function fit() {
    const vw = window.innerWidth - 40;
    const vh = window.innerHeight - 80;
    const scale = Math.min(vw / 1080, vh / 1920);
    document.querySelector('.story').style.setProperty('--preview-scale', scale);
  }
  fit();
  window.addEventListener('resize', fit);
</script>

</body>
</html>
